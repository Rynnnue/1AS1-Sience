<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>قسم 1AS1 - جذع مشترك علوم | التميز والعلم</title>
    <meta name="description" content="الصفحة الرسمية لقسم 1AS1 - جذع مشترك علوم. اكتشف المواد، الشروحات، والموارد التعليمية بأحدث تصميم.">
    <meta name="keywords" content="1AS1, جذع مشترك علوم, ثانوية, علوم, تعليم, جزائر">
    <meta name="author" content="قسم 1AS1">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0b2b26, #123d3a, #1a4f4b);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            color: #fff;
        }

        /* خلفية متحركة وجزيئات */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: floatParticle 12s infinite linear;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* رأس الصفحة */
        .header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 70px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 55px;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
        }

        .sub {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* بطاقات المواد */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .subject-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .subject-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.2);
            border-color: #FFD966;
        }

        .subject-icon {
            font-size: 50px;
            color: #FFD966;
            margin-bottom: 15px;
        }

        .subject-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subject-desc {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* نافذة شرح المواد المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: linear-gradient(145deg, #1e3c3a, #0f2e2b);
            max-width: 700px;
            width: 100%;
            border-radius: 50px;
            padding: 30px;
            position: relative;
            color: white;
            border: 2px solid #ffd966;
            box-shadow: 0 25px 40px black;
            animation: fadeInUp 0.4s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .close-modal {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 30px;
            cursor: pointer;
            color: #ffb347;
        }

        .modal h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            border-right: 5px solid #ffd966;
            padding-right: 15px;
        }

        .modal p {
            line-height: 1.7;
            font-size: 1.05rem;
        }

        .modal img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 30px;
            margin: 20px 0;
            box-shadow: 0 8px 18px black;
        }

        /* لوحة الادمن - خزانة */
        .admin-panel {
            position: fixed;
            bottom: 25px;
            left: 25px;
            z-index: 999;
        }

        .admin-locker {
            background: #2c2c2c;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.2s;
            border: 2px solid #ffd966;
            background: #1f1f1f;
        }

        .admin-locker i {
            font-size: 28px;
            color: #ffd966;
        }

        .admin-locker:hover {
            transform: scale(1.05);
            background: #ffd966;
        }
        .admin-locker:hover i {
            color: #1f1f1f;
        }

        /* قائمة الادمن */
        .admin-menu {
            position: fixed;
            bottom: 90px;
            left: 25px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 15px 20px;
            width: 260px;
            display: none;
            flex-direction: column;
            gap: 12px;
            border: 1px solid gold;
            z-index: 1000;
        }

        .admin-menu input {
            padding: 10px;
            border-radius: 40px;
            border: none;
            text-align: center;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
        }

        .admin-menu button {
            background: #ffb347;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Tajawal', sans-serif;
        }

        .admin-menu button:hover {
            background: #ffd966;
            transform: scale(0.98);
        }

        .msg {
            color: #ffaa66;
            text-align: center;
            font-size: 0.8rem;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2rem; }
            .subjects-grid { gap: 15px; }
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
    <div class="header">
        <div class="logo"><i class="fas fa-flask"></i> 1AS1</div>
        <h1>قسم <span style="color:#FFD966;">جذع مشترك علوم</span></h1>
        <div class="sub">✨ التميز يبدأ من هنا ✨</div>
    </div>

    <!-- شبكة المواد (عند النقر يظهر شرح + صورة) -->
    <div class="subjects-grid" id="subjectsGrid"></div>

    <footer>
        <i class="fas fa-graduation-cap"></i> قسم 1AS1 - رحلة العلم والإبداع
    </footer>
</div>

<!-- نافذة شرح المادة -->
<div id="subjectModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <h2 id="modalTitle"></h2>
        <img id="modalImage" src="" alt="صورة المادة">
        <p id="modalDescription"></p>
    </div>
</div>

<!-- خزانة الادمن -->
<div class="admin-panel">
    <div class="admin-locker" id="adminLockerBtn">
        <i class="fas fa-user-lock"></i>
    </div>
    <div class="admin-menu" id="adminMenu">
        <input type="password" id="adminCode" placeholder="أدخل الرمز السري" inputmode="numeric">
        <button id="submitAdminCode">فتح الخزانة</button>
        <div id="adminMsg" class="msg"></div>
    </div>
</div>

<script>
    // بيانات المواد مع شرح مفصل وصور
    const subjectsData = [
        {
            id: 1,
            name: "علوم الطبيعة والحياة",
            icon: "fas fa-leaf",
            shortDesc: "استكشاف الكائنات الحية والبيئة",
            fullDesc: "مادة علوم الطبيعة والحياة تهدف إلى فهم تركيب الكائنات الحية، وظائفها، تفاعلاتها مع البيئة، بالإضافة إلى دراسة الخلية، الوراثة، التنوع البيولوجي، والنظام البيئي. تعتمد على الملاحظة والتجربة.",
            image: "https://images.unsplash.com/photo-1530026186672-2cd00ffc2fe5?w=600&auto=format"
        },
        {
            id: 2,
            name: "الفيزياء والكيمياء",
            icon: "fas fa-atom",
            shortDesc: "قوانين المادة والطاقة",
            fullDesc: "فيزياء: دراسة الحركة، القوى، الطاقة، الكهرباء، والمغناطيسية. كيمياء: دراسة المادة، تفاعلاتها، الجدول الدوري، الروابط الكيميائية. تطبيقات حياتية وتجارب شيقة.",
            image: "https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?w=600&auto=format"
        },
        {
            id: 3,
            name: "الرياضيات",
            icon: "fas fa-square-root-alt",
            shortDesc: "لغة العلوم والمنطق",
            fullDesc: "الرياضيات في جذع مشترك علوم تشمل: الدوال، الهندسة التحليلية، المتتاليات، الإحصاء، الاحتمالات. تنمي التفكير التحليلي وحل المشكلات.",
            image: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=600&auto=format"
        },
        {
            id: 4,
            name: "اللغة العربية",
            icon: "fas fa-book-open",
            shortDesc: "آداب ونصوص",
            fullDesc: "دراسة النصوص الأدبية، البلاغة، النحو، التعبير الكتابي، تحليل الخطاب. تنمي الذائقة الأدبية والفهم العميق للنصوص.",
            image: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=600&auto=format"
        },
        {
            id: 5,
            name: "اللغة الإنجليزية",
            icon: "fas fa-language",
            shortDesc: "مهارات التواصل العالمي",
            fullDesc: "تطوير مهارات الاستماع، المحادثة، القراءة، الكتابة، قواعد اللغة، مصطلحات علمية تساعد في فهم المراجع العالمية.",
            image: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=600&auto=format"
        },
        {
            id: 6,
            name: "التاريخ والجغرافيا",
            icon: "fas fa-globe-africa",
            shortDesc: "الحضارات والمجالات",
            fullDesc: "دراسة تاريخ الجزائر والعالم، الحضارات، القضايا المعاصرة، الجغرافيا الطبيعية والبشرية، التنمية والخرائط.",
            image: "https://images.unsplash.com/photo-1524661135-423995f22d0b?w=600&auto=format"
        },
        {
            id: 7,
            name: "الفلسفة",
            icon: "fas fa-brain",
            shortDesc: "التفكير النقدي والأخلاق",
            fullDesc: "مقدمة في الفلسفة: مشكلة المعرفة، القيم، الحرية، العدالة، تحليل النصوص الفلسفية، بناء الحجج المنطقية.",
            image: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=600&auto=format"
        },
        {
            id: 8,
            name: "الإعلام الآلي",
            icon: "fas fa-laptop-code",
            shortDesc: "تقنيات العصر الرقمي",
            fullDesc: "خوارزميات، برمجة بلغة بايثون، أنظمة تشغيل، شبكات، أمن معلومات، وأدوات رقمية تساعد في البحث العلمي.",
            image: "https://images.unsplash.com/photo-1587620962725-abab7fe55159?w=600&auto=format"
        }
    ];

    // عرض المواد في الصفحة
    const gridContainer = document.getElementById('subjectsGrid');

    function renderSubjects() {
        gridContainer.innerHTML = '';
        subjectsData.forEach(sub => {
            const card = document.createElement('div');
            card.classList.add('subject-card');
            card.setAttribute('data-id', sub.id);
            card.innerHTML = `
                <div class="subject-icon"><i class="${sub.icon}"></i></div>
                <div class="subject-title">${sub.name}</div>
                <div class="subject-desc">${sub.shortDesc}</div>
            `;
            card.addEventListener('click', () => openModal(sub));
            gridContainer.appendChild(card);
        });
    }

    // النافذة المنبثقة للشرح
    const modal = document.getElementById('subjectModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalImage = document.getElementById('modalImage');
    const modalDescription = document.getElementById('modalDescription');
    const closeModalBtn = document.getElementById('closeModalBtn');

    function openModal(subject) {
        modalTitle.innerText = subject.name;
        modalImage.src = subject.image;
        modalDescription.innerText = subject.fullDesc;
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    closeModalBtn.onclick = closeModal;
    window.onclick = function(e) {
        if (e.target === modal) closeModal();
    };

    // ========== خزانة الادمن ==========
    const lockerBtn = document.getElementById('adminLockerBtn');
    const adminMenu = document.getElementById('adminMenu');
    const submitBtn = document.getElementById('submitAdminCode');
    const adminCodeInput = document.getElementById('adminCode');
    const adminMsg = document.getElementById('adminMsg');

    let isMenuOpen = false;

    lockerBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        isMenuOpen = !isMenuOpen;
        adminMenu.style.display = isMenuOpen ? 'flex' : 'none';
        adminMsg.innerText = '';
        adminCodeInput.value = '';
    });

    // إغلاق القائمة عند النقر خارجها (اختياري)
    document.addEventListener('click', function(event) {
        if (!adminMenu.contains(event.target) && !lockerBtn.contains(event.target)) {
            adminMenu.style.display = 'none';
            isMenuOpen = false;
        }
    });

    submitBtn.addEventListener('click', () => {
        const code = adminCodeInput.value.trim();
        if (code === '123456789') {
            adminMsg.style.color = "#a0ffa0";
            adminMsg.innerText = "✅ مرحباً أيها المدير! تم فتح الخزانة.";
            // هنا يمكنك إظهار لوحة تحكم حقيقية أو روابط مخفية
            // مثلاً: فتح رابط تعديل، أو عرض إحصائيات
            setTimeout(() => {
                alert("🔓 لوحة تحكم المدير: يمكنك الآن إدارة المحتوى، تعديل الشروحات، إضافة صور. (هذه واجهة تجريبية)");
                // يمكنك هنا توجيه المستخدم إلى صفحة admin مخفية أو إظهار أدوات إضافية
                // على سبيل المثال: إضافة زر تحرير للمواد (للتطوير المستقبلي)
            }, 200);
        } else {
            adminMsg.style.color = "#ffaaaa";
            adminMsg.innerText = "❌ رمز خاطئ، حاول مرة أخرى!";
        }
        adminCodeInput.value = '';
    });

    // إنشاء جزيئات عشوائية
    function createParticles() {
        const particlesDiv = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 8 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDuration = `${Math.random() * 15 + 8}s`;
            particle.style.animationDelay = `${Math.random() * 10}s`;
            particle.style.opacity = Math.random() * 0.5;
            particlesDiv.appendChild(particle);
        }
    }

    renderSubjects();
    createParticles();
</script>
</body>
</html>
