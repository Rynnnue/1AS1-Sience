<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>منصة جذع مشترك علوم - تطوير زيوش عماد الدين</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #0a0f1c 0%, #0c1222 100%);
            color: #eef2ff;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e2a3a;
        }
        ::-webkit-scrollbar-thumb {
            background: #f5b042;
            border-radius: 10px;
        }

        .hero {
            background: linear-gradient(135deg, #0b1120 0%, #0f172a 100%);
            padding: 2rem 2rem 3rem;
            border-bottom: 3px solid #f5b042;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: "🧪⚛️📚";
            font-size: 180px;
            opacity: 0.03;
            position: absolute;
            bottom: -30px;
            left: -30px;
            pointer-events: none;
        }
        .hero h1 {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(120deg, #ffffff, #f5b042);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .hero p {
            color: #b9c7d9;
            max-width: 700px;
            margin: 0 auto;
        }
        .developer-tag {
            margin-top: 1rem;
            font-size: 0.9rem;
            background: #1e293bb3;
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .nav-sticky {
            background: #0f172ad9;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            flex-wrap: wrap;
            border-bottom: 1px solid #2d3a5e;
        }
        .nav-sticky a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
        }
        .nav-sticky a:hover {
            color: #f5b042;
            border-bottom-color: #f5b042;
        }

        .container {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .stat-card {
            background: #111827cc;
            backdrop-filter: blur(8px);
            border: 1px solid #2d3a5e;
            border-radius: 32px;
            padding: 1.5rem 1rem;
            text-align: center;
            transition: all 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-6px);
            border-color: #f5b042;
            background: #0f172a;
        }
        .stat-card i {
            font-size: 2.2rem;
            color: #f5b042;
            margin-bottom: 0.7rem;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 2fr 1.2fr;
            gap: 1.8rem;
        }
        @media (max-width: 780px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #0f172ae0;
            backdrop-filter: blur(4px);
            border: 1px solid #28344e;
            border-radius: 36px;
            padding: 1.6rem;
            margin-bottom: 2rem;
            transition: 0.2s;
        }
        .card h2 {
            font-size: 1.6rem;
            border-right: 5px solid #f5b042;
            padding-right: 1rem;
            margin-bottom: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .subject-item {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #28344e;
        }
        .progress-bg {
            background: #1e2a3a;
            border-radius: 20px;
            height: 8px;
            width: 100%;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: #f5b042;
            width: 0%;
            height: 100%;
            border-radius: 20px;
        }

        .schedule-item {
            background: #0b0f1c;
            margin-bottom: 0.9rem;
            padding: 0.8rem 1rem;
            border-radius: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            border-left: 3px solid #f5b042;
        }
        .time-badge {
            background: #f5b042;
            color: #0a0f1c;
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .contact-block {
            background: linear-gradient(145deg, #0b1122, #0f172a);
            border-radius: 32px;
            padding: 1.5rem;
            margin-top: 1rem;
            border: 1px solid #3e4a6b;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 1rem;
            flex-wrap: wrap;
        }
        .contact-item i {
            width: 32px;
            color: #f5b042;
            font-size: 1.3rem;
        }
        .contact-item a {
            color: #e2e8f0;
            text-decoration: none;
            transition: 0.2s;
        }
        .contact-item a:hover {
            color: #f5b042;
        }
        .social-icons {
            display: flex;
            gap: 1.2rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }
        .social-icons a {
            background: #1e2a3a;
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #f5b042;
            transition: 0.2s;
        }
        .social-icons a:hover {
            background: #f5b042;
            color: #0f172a;
            transform: scale(1.05);
        }

        .alert-badge {
            background: #1e293b;
            padding: 0.7rem;
            border-radius: 28px;
            margin-top: 0.5rem;
        }

        footer {
            background: #070b14;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid #28344e;
            font-size: 0.85rem;
        }
        .dev-name {
            color: #f5b042;
            font-weight: bold;
            letter-spacing: 1px;
        }
        hr {
            border-color: #28344e;
            margin: 1rem 0;
        }
        .placeholder-info {
            color: #9ca3af;
            font-style: italic;
        }
    </style>
</head>
<body>

<section class="hero">
    <h1><i class="fas fa-leaf"></i> حديقة العلوم الرقمية</h1>
    <p>الجذع المشترك العلمي – نظام متكامل للمراجعة، الواجبات والتواصل مع الأساتذة</p>
    <div class="developer-tag">
        <i class="fas fa-code"></i> تطوير: <strong>زيوش عماد الدين</strong> | <i class="fas fa-graduation-cap"></i> منصة دراسية 2025
    </div>
</section>

<nav class="nav-sticky">
    <a href="#accueil">🏠 الرئيسية</a>
    <a href="#matieres">📘 المواد</a>
    <a href="#emploi">📅 الجدول</a>
    <a href="#ressources">📚 الموارد</a>
    <a href="#contact">📞 اتصل بنا</a>
</nav>

<div class="container" id="accueil">
    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-flask"></i><div class="stat-number">6</div><div>مواد علمية</div></div>
        <div class="stat-card"><i class="fas fa-tasks"></i><div class="stat-number">12</div><div>واجب نشط</div></div>
        <div class="stat-card"><i class="fas fa-video"></i><div class="stat-number">24</div><div>فيديو تعليمي</div></div>
        <div class="stat-card"><i class="fas fa-calendar-week"></i><div class="stat-number">18</div><div>أسبوع دراسي</div></div>
    </div>

    <div class="two-columns">
        <div>
            <div id="matieres" class="card">
                <h2><i class="fas fa-chalkboard-user"></i> تقدمي في المواد</h2>
                <div class="subject-item"><div><strong>🔬 علوم الحياة والأرض</strong><div class="progress-bg"><div class="progress-fill" style="width: 74%"></div></div></div><span>74%</span></div>
                <div class="subject-item"><div><strong>⚛️ فيزياء وكيمياء</strong><div class="progress-bg"><div class="progress-fill" style="width: 68%"></div></div></div><span>68%</span></div>
                <div class="subject-item"><div><strong>📐 رياضيات</strong><div class="progress-bg"><div class="progress-fill" style="width: 82%"></div></div></div><span>82%</span></div>
                <div class="subject-item"><div><strong>💻 إعلام آلي (Python)</strong><div class="progress-bg"><div class="progress-fill" style="width: 58%"></div></div></div><span>58%</span></div>
                <div class="subject-item"><div><strong>📝 لغة عربية</strong><div class="progress-bg"><div class="progress-fill" style="width: 91%"></div></div></div><span>91%</span></div>
                <div class="subject-item"><div><strong>🇫🇷 لغة فرنسية (علمية)</strong><div class="progress-bg"><div class="progress-fill" style="width: 63%"></div></div></div><span>63%</span></div>
            </div>

            <div id="emploi" class="card">
                <h2><i class="far fa-clock"></i> جدول الحصص الأسبوعي</h2>
                <div class="schedule-item"><span class="time-badge">08h-10h</span><span>الاثنين: رياضيات / الثلاثاء: فيزياء</span></div>
                <div class="schedule-item"><span class="time-badge">10h-12h</span><span>الاثنين: SVT / الأربعاء: إعلام آلي</span></div>
                <div class="schedule-item"><span class="time-badge">12h-14h</span><span>🍽️ استراحة</span></div>
                <div class="schedule-item"><span class="time-badge">14h-16h</span><span>الخميس: فرنسية / الجمعة: تمارين رياضيات</span></div>
                <div class="schedule-item"><span class="time-badge">16h-18h</span><span>أعمال تطبيقية (فيزياء أو SVT)</span></div>
                <div class="schedule-item"><span class="time-badge">⚠️ اختبارات</span><span>اختبار الفيزياء 25 أبريل / رياضيات 30 أبريل</span></div>
            </div>

            <div id="ressources" class="card">
                <h2><i class="fas fa-download"></i> مكتبة الموارد</h2>
                <div class="subject-item"><span><i class="fas fa-file-pdf"></i> سلسلة تمارين الكيمياء محلولة</span><span>PDF</span></div>
                <div class="subject-item"><span><i class="fas fa-file-powerpoint"></i> ملخص الدورة الأولى (SVT)</span><span>PPTX</span></div>
                <div class="subject-item"><span><i class="fab fa-python"></i> تمارين بايثون + الحلول</span><span>ZIP</span></div>
                <div class="subject-item"><span><i class="fas fa-chart-line"></i> تمارين الإحصاء والاحتمالات</span><span>PDF</span></div>
                <div class="subject-item"><span><i class="fas fa-microscope"></i> دليل TP علوم الحياة</span><span>PDF</span></div>
            </div>
        </div>

        <div>
            <div class="card">
                <h2><i class="fas fa-pen-fancy"></i> الواجبات المنزلية</h2>
                <div class="subject-item"><span>📐 تمرين 12 ص 45 (رياضيات)</span><span>قبل: السبت</span></div>
                <div class="subject-item"><span>⚛️ سلسلة كهرباء (فيزياء)</span><span>قبل: الأحد</span></div>
                <div class="subject-item"><span>🧬 رسم تخطيطي لتركيب البروتين</span><span>قبل: الثلاثاء</span></div>
                <div class="subject-item"><span>💻 مشروع آلة حاسبة بسيطة (Python)</span><span>قبل: الخميس</span></div>
                <hr>
                <div class="alert-badge"><i class="fas fa-bell" style="color:#f5b042;"></i> تذكير: مراجعة الفصل الثاني من الرياضيات</div>
            </div>

            <div id="contact" class="card contact-block">
                <h2><i class="fas fa-address-card"></i> معلومات التواصل</h2>
                <div class="contact-item"><i class="fas fa-phone-alt"></i> <span class="placeholder-info">الهاتف: [سيتم الإضافة لاحقاً]</span></div>
                <div class="contact-item"><i class="fas fa-envelope"></i> <span class="placeholder-info">البريد الإلكتروني: [سيتم الإضافة لاحقاً]</span></div>
                <div class="contact-item"><i class="fab fa-whatsapp"></i> <span class="placeholder-info">واتساب: [سيتم الإضافة لاحقاً]</span></div>
                <div class="contact-item"><i class="fab fa-instagram"></i> <span class="placeholder-info">إنستغرام: [سيتم الإضافة لاحقاً]</span></div>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#"><i class="fab fa-github"></i></a>
                </div>
                <hr>
                <div class="contact-item"><i class="fas fa-map-marker-alt"></i> <span class="placeholder-info">العنوان: [سيتم الإضافة لاحقاً]</span></div>
                <div class="contact-item"><i class="fas fa-clock"></i> <span class="placeholder-info">ساعات العمل: [سيتم الإضافة لاحقاً]</span></div>
            </div>

            <div class="card" style="background: #0a0f1c;">
                <h2><i class="fas fa-laptop-code"></i> المطور</h2>
                <p style="margin-bottom: 8px;"><i class="fas fa-user-astronaut"></i> <strong class="dev-name">زيوش عماد الدين</strong></p>
                <p>💡 مطور واجهات تعليمية | مهتم بالذكاء الاصطناعي في التعليم</p>
                <p>📅 الإصدار 2.0 – منصة تفاعلية للجذع المشترك</p>
                <div class="progress-bg" style="margin: 12px 0;"><div class="progress-fill" style="width: 100%; background:#f5b042;"></div></div>
                <p><i class="fas fa-code-branch"></i> منصة دراسية متكاملة للجذع المشترك العلمي</p>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 منصة حديقة العلوم الرقمية | تصميم وبرمجة: <span class="dev-name">زيوش عماد الدين</span></p>
    <p style="margin-top: 8px; font-size: 0.75rem;"><i class="fas fa-mobile-alt"></i> منصة تعليمية تفاعلية – جميع الحقوق محفوظة</p>
    <p style="margin-top: 5px;">مخصص لطلبة الجذع المشترك العلمي</p>
</footer>

</body>
</html>
